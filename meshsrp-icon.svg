<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12160f"/>
      <stop offset="100%" stop-color="#0b0d0a"/>
    </linearGradient>
  </defs>

  <!-- fondo -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#242b22" stroke-width="2"/>

  <!-- staffe da mirino agli angoli -->
  <g stroke="#3a423a" stroke-width="6" fill="none" stroke-linecap="square">
    <path d="M 96 132 v-24 h24"/>
    <path d="M 416 132 v-24 h-24"/>
    <path d="M 96 380 v24 h24"/>
    <path d="M 416 380 v24 h-24"/>
  </g>

  <!-- simbolo centrale: nodi a rombo + chevron di trasmissione -->
  <g transform="translate(256,272)">
    <!-- maglie -->
    <line x1="0" y1="-96" x2="-92" y2="70" stroke="#6fcf6f" stroke-width="15" stroke-linecap="square"/>
    <line x1="0" y1="-96" x2="92" y2="70" stroke="#6fcf6f" stroke-width="15" stroke-linecap="square"/>
    <line x1="-92" y1="70" x2="92" y2="70" stroke="#6fcf6f" stroke-width="15" stroke-linecap="square"/>

    <!-- nodi a rombo -->
    <rect x="-23" y="-119" width="46" height="46" transform="rotate(45 0 -96)" fill="#0d0f0d" stroke="#e0a458" stroke-width="15"/>
    <rect x="-115" y="47" width="46" height="46" transform="rotate(45 -92 70)" fill="#0d0f0d" stroke="#6fcf6f" stroke-width="15"/>
    <rect x="69" y="47" width="46" height="46" transform="rotate(45 92 70)" fill="#0d0f0d" stroke="#6fcf6f" stroke-width="15"/>

    <!-- chevron di trasmissione -->
    <path d="M -32 -146 L 0 -168 L 32 -146" fill="none" stroke="#e0a458" stroke-width="13" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>
</svg>
