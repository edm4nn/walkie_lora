<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f0d" />
  <title>MeshSRP</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header id="status-bar">
      <div id="status-node">
        <img id="status-logo" src="icons/icon.svg" alt="" width="18" height="18" />
        <span id="status-ble-dot" class="ble-dot" aria-hidden="true"></span>
        <span id="status-node-label">Nodo non collegato</span>
      </div>
      <div id="status-test-banner" class="test-banner" hidden></div>
    </header>

    <main id="tab-content" aria-live="polite"></main>

    <nav id="tab-bar">
      <button type="button" class="tab-btn" data-tab="chat">
        <svg class="tab-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 4.5h16v12H8.5L4 20.5v-4z" />
        </svg>
        <span class="tab-btn-label">CHAT</span>
      </button>
      <button type="button" class="tab-btn" data-tab="maps">
        <svg class="tab-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s7-7.4 7-12a7 7 0 1 0-14 0c0 4.6 7 12 7 12z" />
          <circle cx="12" cy="9" r="2.4" />
        </svg>
        <span class="tab-btn-label">MAPPE</span>
      </button>
      <button type="button" class="tab-btn" data-tab="sensors">
        <svg class="tab-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12h4l2-7 4 14 2-7h6" />
        </svg>
        <span class="tab-btn-label">SENSORI</span>
      </button>
      <button type="button" class="tab-btn" data-tab="settings">
        <svg class="tab-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 2.5v3M12 18.5v3M4.4 4.4l2.1 2.1M17.5 17.5l2.1 2.1M2.5 12h3M18.5 12h3M4.4 19.6l2.1-2.1M17.5 6.5l2.1-2.1" />
        </svg>
        <span class="tab-btn-label">IMPOSTAZIONI</span>
      </button>
    </nav>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
